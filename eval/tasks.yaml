# CodeRouter eval suite (v0)
#
# Each task is a labeled scenario the evaluation harness runs against
# the routing + classification + plan/masterplan/agent pipeline.
# Tasks reference fixtures under `eval/fixtures/<fixture>` and define
# expected outcomes (classification, route family, validator pass).
#
# Run all tasks:   pnpm eval
# Run a subset:    pnpm eval -- --filter classify-*

tasks:
  - id: classify-typo-fix
    description: trivial typo correction must short-circuit via instant matcher
    prompt: "fix typo in README headline"
    expect:
      taskType: trivial
      source: instant
      routeFamily: cheap
    budget:
      preAgentMs: 250

  - id: classify-bugfix-stack-trace
    description: stack trace in prompt routes to investigation/bugfix
    prompt: |
      `TypeError: Cannot read properties of undefined (reading 'map')`
      at packages/core/src/parser.ts:42:18
      please fix
    expect:
      taskType: bugfix
      source: rules
      routeFamily: strong
    budget:
      preAgentMs: 600

  - id: classify-multi-file-refactor
    description: rename across many files should classify as refactor
    prompt: "rename getCwd to getCurrentWorkingDirectory across the entire repo"
    expect:
      taskType: refactor
      source: rules
      cognitiveShape: { multiFileTaste: true }
      routeFamily: strong

  - id: classify-documentation
    description: docs-only request should pick a cheap docs route
    prompt: "document the @coderouter/core public API in README.md"
    expect:
      taskType: docs
      routeFamily: cheap

  - id: plan-feature
    description: feature ask should produce a structured Plan
    mode: plan
    prompt: "add a `/score` MCP tool that returns adapter health"
    fixture: empty
    expect:
      planContains:
        - "phase"
        - "deliverable"

  - id: masterplan-research
    description: masterplan should produce citations + 6 phases
    mode: masterplan
    prompt: "design a memory subsystem that supports L1-L5 with TTLs"
    fixture: empty
    expect:
      planContains:
        - "## Phase"
        - "## References"
      citationCount: ">=1"

  - id: agent-validator-loop
    description: agent run with linter failure should attempt handoff fix
    mode: agent
    prompt: "fix the eslint error in src/index.ts"
    fixture: lint-error
    expect:
      validatorStatus: pass
      handoffAttempted: true

baselines:
  # Used by the harness to compare CodeRouter against pure-baseline runs.
  - name: claude-only
    route: claude_code,sonnet-4.5
  - name: codex-only
    route: codex,gpt-5
  - name: coderouter
    via: coderouter
